<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" fill="none">
  <defs>
    <filter id="s1" x="-12%" y="-12%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.10"/>
    </filter>
    <filter id="s2" x="-15%" y="-15%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#4c1d95" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="pinkG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/><stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="creamG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/><stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="mintG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d1fae5"/><stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="lavG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede9fe"/><stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="warmG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fed7aa"/><stop offset="100%" stop-color="#fdba74"/>
    </linearGradient>
    <linearGradient id="frostG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fda4af"/><stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="chocoG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a16207"/><stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
  </defs>

  <!-- ============================================ -->
  <!-- DECORATIVE BACKGROUND CIRCLES (subtle depth) -->
  <!-- ============================================ -->
  <circle cx="300" cy="260" r="220" fill="white" opacity="0.06"/>
  <circle cx="300" cy="260" r="170" fill="white" opacity="0.05"/>
  <circle cx="300" cy="260" r="115" fill="white" opacity="0.04"/>

  <!-- Dotted orbit rings -->
  <circle cx="300" cy="260" r="210" fill="none" stroke="white" stroke-width="0.8" stroke-opacity="0.1" stroke-dasharray="4 8"/>
  <circle cx="300" cy="260" r="160" fill="none" stroke="white" stroke-width="0.6" stroke-opacity="0.08" stroke-dasharray="3 10"/>

  <!-- ============================================ -->
  <!--       MAIN ELEMENT: WEDDING/LAYER CAKE       -->
  <!--          (center, largest element)            -->
  <!-- ============================================ -->
  <g filter="s2" transform="translate(230, 155)">
    <!-- Cake stand -->
    <ellipse cx="70" cy="195" rx="55" ry="8" fill="#e5e7eb"/>
    <rect x="55" y="188" width="30" height="10" rx="2" fill="#d1d5db"/>
    <ellipse cx="70" cy="188" rx="52" ry="6" fill="#f3f4f6"/>

    <!-- Layer 3 (bottom) -->
    <rect x="15" y="148" width="110" height="42" rx="8" fill="#fef3c7"/>
    <rect x="15" y="148" width="110" height="12" rx="8" fill="#fde68a"/>
    <!-- Drip icing -->
    <path d="M20 160 q5 8 0 14 M40 160 q4 10 0 16 M60 160 q5 7 0 12 M80 160 q4 11 0 15 M100 160 q5 9 0 13 M120 160 q4 7 0 11" stroke="#f472b6" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>

    <!-- Layer 2 (middle) -->
    <rect x="30" y="108" width="80" height="42" rx="8" fill="#fce7f3"/>
    <rect x="30" y="108" width="80" height="12" rx="8" fill="#fbcfe8"/>
    <!-- Decorative dots -->
    <circle cx="45" cy="130" r="2.5" fill="#f9a8d4"/>
    <circle cx="57" cy="133" r="2" fill="#f9a8d4"/>
    <circle cx="70" cy="130" r="2.5" fill="#f9a8d4"/>
    <circle cx="83" cy="133" r="2" fill="#f9a8d4"/>
    <circle cx="95" cy="130" r="2.5" fill="#f9a8d4"/>

    <!-- Layer 1 (top) -->
    <rect x="45" y="75" width="50" height="35" rx="8" fill="white"/>
    <rect x="45" y="75" width="50" height="10" rx="8" fill="#fef9c3"/>
    <!-- Rose on top -->
    <circle cx="70" cy="72" r="8" fill="#fb7185"/>
    <circle cx="70" cy="72" r="5" fill="#fda4af"/>
    <circle cx="70" cy="72" r="2.5" fill="#fecdd3"/>
    <!-- Leaves -->
    <ellipse cx="60" cy="75" rx="5" ry="2.5" fill="#86efac" transform="rotate(-30 60 75)"/>
    <ellipse cx="80" cy="75" rx="5" ry="2.5" fill="#86efac" transform="rotate(30 80 75)"/>
  </g>

  <!-- ============================================ -->
  <!--        CUPCAKE (top-left floating)            -->
  <!-- ============================================ -->
  <g filter="s1" transform="translate(60, 45)">
    <!-- Cupcake wrapper -->
    <path d="M20 75 L28 45 h34 L70 75 z" fill="#c084fc" opacity="0.85"/>
    <!-- Wrapper lines -->
    <line x1="30" y1="73" x2="33" y2="48" stroke="#a855f7" stroke-width="0.8" opacity="0.4"/>
    <line x1="40" y1="75" x2="41" y2="46" stroke="#a855f7" stroke-width="0.8" opacity="0.4"/>
    <line x1="50" y1="75" x2="49" y2="46" stroke="#a855f7" stroke-width="0.8" opacity="0.4"/>
    <line x1="60" y1="73" x2="57" y2="48" stroke="#a855f7" stroke-width="0.8" opacity="0.4"/>

    <!-- Frosting swirl -->
    <ellipse cx="45" cy="44" rx="22" ry="10" fill="#fecdd3"/>
    <ellipse cx="45" cy="38" rx="17" ry="9" fill="#fda4af"/>
    <ellipse cx="45" cy="33" rx="12" ry="7" fill="#fb7185"/>
    <ellipse cx="45" cy="29" rx="7" ry="5" fill="#f43f5e"/>
    <!-- Cherry -->
    <circle cx="45" cy="23" r="5" fill="#dc2626"/>
    <ellipse cx="43" cy="21" rx="2" ry="1.5" fill="#ef4444" opacity="0.6"/>
    <!-- Stem -->
    <path d="M45 18 q4 -6 8 -5" stroke="#15803d" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Leaf -->
    <ellipse cx="54" cy="14" rx="4" ry="2" fill="#4ade80" transform="rotate(15 54 14)"/>
    <!-- Sprinkles -->
    <rect x="35" y="36" width="4" height="1.5" rx="0.75" fill="#fbbf24" transform="rotate(25 37 37)"/>
    <rect x="50" y="33" width="4" height="1.5" rx="0.75" fill="#34d399" transform="rotate(-15 52 34)"/>
    <rect x="40" y="42" width="3.5" height="1.5" rx="0.75" fill="#60a5fa" transform="rotate(40 41 43)"/>
    <rect x="55" y="40" width="3.5" height="1.5" rx="0.75" fill="#fbbf24" transform="rotate(-30 56 41)"/>
  </g>

  <!-- ============================================ -->
  <!--         CROISSANT (top-right floating)        -->
  <!-- ============================================ -->
  <g filter="s1" transform="translate(430, 25)">
    <!-- Croissant body -->
    <path d="M30 65 Q15 45 25 25 Q35 10 55 15 Q70 18 75 35 Q78 50 65 60 Q55 55 45 58 Q38 60 30 65 Z" fill="#f59e0b"/>
    <path d="M30 65 Q15 45 25 25 Q35 10 55 15 Q70 18 75 35 Q78 50 65 60 Q55 55 45 58 Q38 60 30 65 Z" fill="url(#warmG)" opacity="0.5"/>
    <!-- Layers/ridges -->
    <path d="M32 55 Q40 48 50 52" stroke="#d97706" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M28 47 Q38 38 52 44" stroke="#d97706" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M26 38 Q36 28 54 32" stroke="#d97706" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- Shine -->
    <ellipse cx="45" cy="30" rx="12" ry="5" fill="white" opacity="0.15" transform="rotate(-20 45 30)"/>
    <!-- Steam lines -->
    <path d="M40 12 q-2 -8 2 -12" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M50 8 q-2 -7 1 -12" stroke="white" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- ============================================ -->
  <!--        DONUT (left side, mid-level)           -->
  <!-- ============================================ -->
  <g filter="s1" transform="translate(30, 250)">
    <!-- Donut body -->
    <circle cx="45" cy="45" r="32" fill="#f59e0b"/>
    <circle cx="45" cy="45" r="12" fill="white" opacity="0.9"/>
    <!-- Icing top half -->
    <path d="M13 40 Q13 15 45 13 Q77 15 77 40 Q75 48 70 45 Q65 50 58 46 Q52 52 45 47 Q38 52 32 46 Q25 50 20 45 Q15 48 13 40 Z" fill="#ec4899"/>
    <!-- Sprinkles on icing -->
    <rect x="25" y="22" width="5" height="2" rx="1" fill="#fbbf24" transform="rotate(30 27 23)"/>
    <rect x="40" y="17" width="5" height="2" rx="1" fill="#34d399" transform="rotate(-20 42 18)"/>
    <rect x="55" y="20" width="5" height="2" rx="1" fill="#60a5fa" transform="rotate(45 57 21)"/>
    <rect x="33" y="30" width="4" height="2" rx="1" fill="#f43f5e" transform="rotate(-35 35 31)"/>
    <rect x="52" y="32" width="4" height="2" rx="1" fill="#fbbf24" transform="rotate(20 54 33)"/>
    <rect x="20" y="34" width="4" height="1.8" rx="0.9" fill="#a78bfa" transform="rotate(50 22 35)"/>
    <rect x="62" y="28" width="4" height="1.8" rx="0.9" fill="#fb923c" transform="rotate(-10 64 29)"/>
    <!-- Shine -->
    <ellipse cx="35" cy="25" rx="6" ry="3" fill="white" opacity="0.2" transform="rotate(-15 35 25)"/>
  </g>

  <!-- ============================================ -->
  <!--      WHISK (right side, management tool)      -->
  <!-- ============================================ -->
  <g filter="s1" transform="translate(470, 135) rotate(15)">
    <!-- Handle -->
    <rect x="12" y="0" width="10" height="55" rx="5" fill="#9ca3af"/>
    <rect x="12" y="0" width="10" height="15" rx="5" fill="#6b7280"/>
    <!-- Wires -->
    <path d="M12 55 Q4 80 8 110 Q12 125 17 110 Q22 80 22 55" stroke="#d1d5db" stroke-width="1.8" fill="none"/>
    <path d="M14 55 Q8 85 12 110 Q15 120 19 110 Q23 85 20 55" stroke="#d1d5db" stroke-width="1.8" fill="none"/>
    <path d="M15 55 Q12 90 15 108 Q17 115 19 108 Q22 90 19 55" stroke="#e5e7eb" stroke-width="1.5" fill="none"/>
    <!-- Shine on handle -->
    <rect x="14" y="5" width="3" height="40" rx="1.5" fill="white" opacity="0.2"/>
  </g>

  <!-- ============================================ -->
  <!--     MIXING BOWL (bottom-right)                -->
  <!-- ============================================ -->
  <g filter="s1" transform="translate(420, 350)">
    <!-- Bowl -->
    <ellipse cx="65" cy="70" rx="58" ry="20" fill="#e5e7eb"/>
    <path d="M7 50 Q7 85 65 90 Q123 85 123 50 Z" fill="#f3f4f6"/>
    <path d="M7 50 Q7 42 65 38 Q123 42 123 50" fill="#d1d5db"/>
    <!-- Batter -->
    <ellipse cx="65" cy="48" rx="52" ry="12" fill="#fde68a"/>
    <ellipse cx="65" cy="46" rx="40" ry="8" fill="#fef3c7" opacity="0.6"/>
    <!-- Flour puff -->
    <circle cx="40" cy="40" r="5" fill="white" opacity="0.3"/>
    <circle cx="50" cy="35" r="4" fill="white" opacity="0.2"/>
    <circle cx="80" cy="38" r="4" fill="white" opacity="0.25"/>
    <!-- Spoon handle sticking out -->
    <rect x="90" y="15" width="6" height="45" rx="3" fill="#a16207" transform="rotate(25 93 37)"/>
  </g>

  <!-- ============================================ -->
  <!--      ROLLING PIN (bottom-left)                -->
  <!-- ============================================ -->
  <g filter="s1" transform="translate(45, 395) rotate(-12)">
    <!-- Left handle -->
    <rect x="0" y="10" width="22" height="14" rx="7" fill="#9ca3af"/>
    <!-- Main roller -->
    <rect x="20" y="5" width="100" height="24" rx="6" fill="#e5e7eb"/>
    <rect x="20" y="5" width="100" height="8" rx="4" fill="#f3f4f6" opacity="0.5"/>
    <!-- Right handle -->
    <rect x="118" y="10" width="22" height="14" rx="7" fill="#9ca3af"/>
    <!-- Shine -->
    <rect x="35" y="8" width="70" height="3" rx="1.5" fill="white" opacity="0.25"/>
  </g>

  <!-- ============================================ -->
  <!--      COOKIE (floating, top-center-right)      -->
  <!-- ============================================ -->
  <g filter="s1" transform="translate(370, 105)">
    <!-- Cookie base with bumpy edge -->
    <circle cx="28" cy="28" r="25" fill="#d4a574"/>
    <circle cx="28" cy="28" r="23" fill="#deb887"/>
    <!-- Choco chips -->
    <ellipse cx="20" cy="20" rx="3.5" ry="3" fill="#78350f"/>
    <ellipse cx="33" cy="18" rx="3" ry="2.5" fill="#78350f"/>
    <ellipse cx="22" cy="33" rx="3" ry="2.5" fill="#78350f"/>
    <ellipse cx="36" cy="30" rx="2.5" ry="3" fill="#78350f"/>
    <ellipse cx="28" cy="38" rx="2.5" ry="2" fill="#78350f"/>
    <ellipse cx="15" cy="27" rx="2" ry="2.5" fill="#78350f"/>
    <!-- Crack details -->
    <path d="M18 25 l3 2" stroke="#c68c53" stroke-width="0.6" opacity="0.4"/>
    <path d="M30 35 l2 -1" stroke="#c68c53" stroke-width="0.6" opacity="0.4"/>
    <!-- Shine -->
    <ellipse cx="24" cy="22" rx="5" ry="3" fill="white" opacity="0.1" transform="rotate(-20 24 22)"/>
  </g>

  <!-- ============================================ -->
  <!--    PRICE TAG / LABEL (gestión element)        -->
  <!-- ============================================ -->
  <g filter="s1" transform="translate(490, 265)">
    <rect x="0" y="0" width="72" height="48" rx="10" fill="white"/>
    <rect x="0" y="0" width="72" height="16" rx="10" fill="#7c3aed"/>
    <rect x="0" y="10" width="72" height="6" fill="#7c3aed"/>
    <text x="36" y="12" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">PRECIO</text>
    <text x="36" y="36" font-family="Arial, sans-serif" font-size="16" fill="#1e1b4b" text-anchor="middle" font-weight="bold">$30</text>
    <text x="36" y="45" font-family="Arial, sans-serif" font-size="6" fill="#9ca3af" text-anchor="middle">por unidad</text>
  </g>

  <!-- ============================================ -->
  <!--    MINI CHART (gestión element, bottom)       -->
  <!-- ============================================ -->
  <g filter="s1" transform="translate(220, 420)">
    <rect x="0" y="0" width="90" height="60" rx="12" fill="white"/>
    <text x="12" y="16" font-family="Arial, sans-serif" font-size="7" fill="#9ca3af">Ventas</text>
    <text x="12" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e1b4b">$4.2k</text>
    <!-- Mini sparkline -->
    <polyline points="12,48 22,44 32,50 42,40 52,42 62,35 72,38" stroke="#7c3aed" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="72" cy="38" r="3" fill="#7c3aed"/>
    <!-- Trend arrow -->
    <rect x="60" y="14" width="22" height="14" rx="7" fill="#dcfce7"/>
    <text x="71" y="24" font-family="Arial, sans-serif" font-size="7" fill="#16a34a" text-anchor="middle">+12%</text>
  </g>

  <!-- ============================================ -->
  <!--   CLIPBOARD / ORDER (gestión, mid-left)       -->
  <!-- ============================================ -->
  <g filter="s1" transform="translate(5, 150)">
    <!-- Board -->
    <rect x="0" y="10" width="55" height="72" rx="6" fill="white"/>
    <!-- Clip -->
    <rect x="15" y="4" width="25" height="14" rx="4" fill="#7c3aed"/>
    <rect x="20" y="8" width="15" height="6" rx="3" fill="#a78bfa"/>
    <!-- Lines -->
    <rect x="10" y="25" width="30" height="3" rx="1.5" fill="#e5e7eb"/>
    <rect x="10" y="33" width="35" height="3" rx="1.5" fill="#e5e7eb"/>
    <rect x="10" y="41" width="25" height="3" rx="1.5" fill="#e5e7eb"/>
    <rect x="10" y="49" width="32" height="3" rx="1.5" fill="#e5e7eb"/>
    <!-- Checkmarks -->
    <path d="M42 26 l2 2 l4 -4" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M42 34 l2 2 l4 -4" stroke="#22c55e" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M42 42 l2 2 l4 -4" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bottom section -->
    <rect x="10" y="60" width="35" height="3" rx="1.5" fill="#ddd6fe"/>
    <rect x="10" y="67" width="20" height="3" rx="1.5" fill="#ddd6fe"/>
  </g>

  <!-- ============================================ -->
  <!--    FLOUR BAG (ingredient/inventory)           -->
  <!-- ============================================ -->
  <g filter="s1" transform="translate(140, 345)">
    <!-- Bag body -->
    <rect x="5" y="18" width="50" height="55" rx="4" fill="#fef9c3"/>
    <rect x="5" y="18" width="50" height="55" rx="4" stroke="#fde68a" stroke-width="1"/>
    <!-- Bag top (gathered) -->
    <path d="M10 18 Q15 8 30 6 Q45 8 50 18" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
    <!-- Tie -->
    <rect x="24" y="12" width="12" height="4" rx="2" fill="#f59e0b"/>
    <!-- Label -->
    <rect x="12" y="30" width="36" height="22" rx="3" fill="white"/>
    <text x="30" y="40" font-family="Arial, sans-serif" font-size="6" fill="#92400e" text-anchor="middle" font-weight="bold">HARINA</text>
    <text x="30" y="48" font-family="Arial, sans-serif" font-size="5" fill="#b45309" text-anchor="middle">Premium</text>
    <!-- Flour dust -->
    <circle cx="15" cy="15" r="3" fill="white" opacity="0.4"/>
    <circle cx="45" cy="12" r="2" fill="white" opacity="0.3"/>
    <circle cx="8" cy="22" r="2" fill="white" opacity="0.25"/>
  </g>

  <!-- ============================================ -->
  <!--    STARS / SPARKLES (decoration)              -->
  <!-- ============================================ -->
  <!-- Star 1 -->
  <g transform="translate(175, 85)" fill="#fbbf24" filter="glow">
    <polygon points="8,0 10,6 16,6 11,10 13,16 8,12 3,16 5,10 0,6 6,6" opacity="0.8"/>
  </g>
  <!-- Star 2 -->
  <g transform="translate(540, 175)" fill="#f9a8d4" filter="glow">
    <polygon points="6,0 7.5,4.5 12,4.5 8.5,7.5 9.5,12 6,9 2.5,12 3.5,7.5 0,4.5 4.5,4.5" opacity="0.7"/>
  </g>
  <!-- Star 3 -->
  <g transform="translate(350, 390)" fill="#a78bfa" filter="glow">
    <polygon points="7,0 9,5 14,5 10,8.5 11.5,14 7,10.5 2.5,14 4,8.5 0,5 5,5" opacity="0.6"/>
  </g>

  <!-- Sparkle dots -->
  <circle cx="185" cy="175" r="3" fill="#fbbf24" opacity="0.5"/>
  <circle cx="430" cy="95" r="2.5" fill="#f9a8d4" opacity="0.4"/>
  <circle cx="550" cy="350" r="3" fill="#c4b5fd" opacity="0.4"/>
  <circle cx="120" cy="330" r="2" fill="#fbbf24" opacity="0.35"/>
  <circle cx="395" cy="440" r="2.5" fill="#f9a8d4" opacity="0.3"/>
  <circle cx="200" cy="425" r="2" fill="#86efac" opacity="0.35"/>

  <!-- Small floating hearts -->
  <g transform="translate(160, 45)" fill="#f43f5e" opacity="0.4">
    <path d="M5 3 Q5 0 3 0 Q0 0 0 3 Q0 5 5 8 Q10 5 10 3 Q10 0 7 0 Q5 0 5 3 Z"/>
  </g>
  <g transform="translate(530, 130)" fill="#f43f5e" opacity="0.3">
    <path d="M4 2.5 Q4 0 2.5 0 Q0 0 0 2.5 Q0 4 4 6.5 Q8 4 8 2.5 Q8 0 5.5 0 Q4 0 4 2.5 Z"/>
  </g>

  <!-- ============================================ -->
  <!--   BOX / PACKAGE (delivery/inventory)          -->
  <!-- ============================================ -->
  <g filter="s1" transform="translate(505, 395)">
    <!-- Box body -->
    <rect x="0" y="16" width="55" height="40" rx="3" fill="#dbeafe"/>
    <rect x="0" y="16" width="55" height="40" rx="3" stroke="#93c5fd" stroke-width="1"/>
    <!-- Box lid -->
    <path d="M-3 16 L27.5 4 L58 16 L27.5 22 Z" fill="#bfdbfe"/>
    <path d="M27.5 22 L27.5 4" stroke="#93c5fd" stroke-width="0.8"/>
    <!-- Tape -->
    <rect x="22" y="22" width="11" height="20" rx="1" fill="#7c3aed" opacity="0.3"/>
    <!-- Label -->
    <rect x="5" y="38" width="20" height="12" rx="2" fill="white" opacity="0.7"/>
    <rect x="7" y="41" width="10" height="2" rx="1" fill="#7c3aed" opacity="0.4"/>
    <rect x="7" y="45" width="14" height="2" rx="1" fill="#7c3aed" opacity="0.3"/>
  </g>
</svg>
