<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 550" fill="none">
  <defs>
    <filter id="s1" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="s2" x="-10%" y="-10%" width="130%" height="130%">
