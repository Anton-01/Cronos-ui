<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <defs>
    <filter id="shadow1" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <filter id="shadow2" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f9ff"/>
    </linearGradient>
    <linearGradient id="progressGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect x="20" y="15" width="560" height="470" rx="20"/>
    </clipPath>
  </defs>

  <!-- Main Dashboard Card -->
  <g filter="shadow2">
    <rect x="40" y="30" width="520" height="440" rx="16" fill="url(#cardGrad)" stroke="#e5e7eb" stroke-width="1"/>
  </g>

  <!-- Top Bar -->
  <rect x="40" y="30" width="520" height="56" rx="16" fill="#1e1b4b"/>
  <rect x="40" y="60" width="520" height="26" fill="#1e1b4b"/>

  <!-- Cronos Logo Text in Topbar -->
  <text x="70" y="65" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" letter-spacing="1">CRONOS</text>
  <text x="138" y="65" font-family="Arial, sans-serif" font-size="10" fill="#a5b4fc">Gestión</text>

  <!-- Nav Items -->
  <rect x="250" y="52" width="50" height="6" rx="3" fill="#6366f1"/>
  <rect x="315" y="52" width="40" height="6" rx="3" fill="#4b5563" opacity="0.4"/>
  <rect x="370" y="52" width="45" height="6" rx="3" fill="#4b5563" opacity="0.4"/>
  <rect x="430" y="52" width="35" height="6" rx="3" fill="#4b5563" opacity="0.4"/>

  <!-- User Avatar -->
  <circle cx="520" cy="58" r="14" fill="#6366f1"/>
  <text x="520" y="63" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">A</text>

  <!-- Stats Row -->
  <!-- Card 1: Total Usuarios -->
  <g filter="shadow1">
    <rect x="60" y="100" width="145" height="85" rx="12" fill="white" stroke="#f3f4f6" stroke-width="1"/>
  </g>
  <circle cx="85" cy="125" r="14" fill="#ede9fe"/>
  <path d="M80 125 a5 5 0 1 1 10 0 a5 5 0 1 1 -10 0" fill="#6366f1"/>
  <path d="M77 135 q8 6 16 0" stroke="#6366f1" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="108" y="123" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Usuarios</text>
  <text x="108" y="142" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e1b4b">1,284</text>
  <text x="108" y="158" font-family="Arial, sans-serif" font-size="8" fill="#10b981">+12.5%</text>

  <!-- Card 2: Tareas Activas -->
  <g filter="shadow1">
    <rect x="220" y="100" width="145" height="85" rx="12" fill="white" stroke="#f3f4f6" stroke-width="1"/>
  </g>
  <circle cx="245" cy="125" r="14" fill="#fef3c7"/>
  <rect x="239" y="119" width="12" height="12" rx="2" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <path d="M242 125 l3 3 l5 -6" stroke="#f59e0b" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="268" y="123" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Tareas</text>
  <text x="268" y="142" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e1b4b">847</text>
  <text x="268" y="158" font-family="Arial, sans-serif" font-size="8" fill="#10b981">+8.2%</text>

  <!-- Card 3: Proyectos -->
  <g filter="shadow1">
    <rect x="380" y="100" width="160" height="85" rx="12" fill="white" stroke="#f3f4f6" stroke-width="1"/>
  </g>
  <circle cx="405" cy="125" r="14" fill="#d1fae5"/>
  <rect x="399" y="118" width="12" height="14" rx="2" fill="none" stroke="#10b981" stroke-width="2"/>
  <path d="M396 121 h18" stroke="#10b981" stroke-width="2"/>
  <text x="428" y="123" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">Proyectos</text>
  <text x="428" y="142" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e1b4b">56</text>
  <text x="428" y="158" font-family="Arial, sans-serif" font-size="8" fill="#10b981">+3 nuevos</text>

  <!-- Chart Area -->
  <g filter="shadow1">
    <rect x="60" y="200" width="310" height="180" rx="12" fill="white" stroke="#f3f4f6" stroke-width="1"/>
  </g>
  <text x="80" y="225" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e1b4b">Rendimiento Semanal</text>
  <text x="80" y="240" font-family="Arial, sans-serif" font-size="9" fill="#9ca3af">Tareas completadas por día</text>

  <!-- Chart Grid Lines -->
  <line x1="80" y1="260" x2="350" y2="260" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="80" y1="290" x2="350" y2="290" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="80" y1="320" x2="350" y2="320" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="80" y1="350" x2="350" y2="350" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Area Chart -->
  <path d="M80 345 L120 320 L160 335 L200 295 L240 310 L280 270 L320 255 L350 265 L350 355 L80 355 Z" fill="url(#chartGrad)"/>
  <path d="M80 345 L120 320 L160 335 L200 295 L240 310 L280 270 L320 255 L350 265" stroke="#6366f1" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Chart Dots -->
  <circle cx="120" cy="320" r="4" fill="#6366f1" stroke="white" stroke-width="2"/>
  <circle cx="200" cy="295" r="4" fill="#6366f1" stroke="white" stroke-width="2"/>
  <circle cx="280" cy="270" r="4" fill="#6366f1" stroke="white" stroke-width="2"/>
  <circle cx="320" cy="255" r="5" fill="#6366f1" stroke="white" stroke-width="2"/>

  <!-- Tooltip on highest point -->
  <rect x="298" y="232" width="44" height="20" rx="4" fill="#1e1b4b"/>
  <text x="320" y="246" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">142</text>
  <polygon points="316,252 320,258 324,252" fill="#1e1b4b"/>

  <!-- Day Labels -->
  <text x="90" y="370" font-family="Arial, sans-serif" font-size="8" fill="#9ca3af">Lun</text>
  <text x="130" y="370" font-family="Arial, sans-serif" font-size="8" fill="#9ca3af">Mar</text>
  <text x="170" y="370" font-family="Arial, sans-serif" font-size="8" fill="#9ca3af">Mie</text>
  <text x="210" y="370" font-family="Arial, sans-serif" font-size="8" fill="#9ca3af">Jue</text>
  <text x="250" y="370" font-family="Arial, sans-serif" font-size="8" fill="#9ca3af">Vie</text>
  <text x="290" y="370" font-family="Arial, sans-serif" font-size="8" fill="#9ca3af">Sab</text>
  <text x="330" y="370" font-family="Arial, sans-serif" font-size="8" fill="#9ca3af">Dom</text>

  <!-- Right Side Panel - Activity -->
  <g filter="shadow1">
    <rect x="385" y="200" width="155" height="180" rx="12" fill="white" stroke="#f3f4f6" stroke-width="1"/>
  </g>
  <text x="405" y="225" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e1b4b">Actividad</text>

  <!-- Donut Chart -->
  <circle cx="462" cy="285" r="35" fill="none" stroke="#e5e7eb" stroke-width="8"/>
  <circle cx="462" cy="285" r="35" fill="none" stroke="#6366f1" stroke-width="8" stroke-dasharray="132 220" stroke-dashoffset="0" transform="rotate(-90 462 285)"/>
  <circle cx="462" cy="285" r="35" fill="none" stroke="#f59e0b" stroke-width="8" stroke-dasharray="55 220" stroke-dashoffset="-132" transform="rotate(-90 462 285)"/>
  <circle cx="462" cy="285" r="35" fill="none" stroke="#10b981" stroke-width="8" stroke-dasharray="33 220" stroke-dashoffset="-187" transform="rotate(-90 462 285)"/>
  <text x="462" y="283" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e1b4b" text-anchor="middle">85%</text>
  <text x="462" y="295" font-family="Arial, sans-serif" font-size="8" fill="#9ca3af" text-anchor="middle">Completado</text>

  <!-- Legend -->
  <circle cx="405" cy="340" r="4" fill="#6366f1"/>
  <text x="415" y="343" font-family="Arial, sans-serif" font-size="8" fill="#6b7280">En progreso</text>
  <circle cx="405" cy="355" r="4" fill="#f59e0b"/>
  <text x="415" y="358" font-family="Arial, sans-serif" font-size="8" fill="#6b7280">Pendiente</text>
  <circle cx="405" cy="370" r="4" fill="#10b981"/>
  <text x="415" y="373" font-family="Arial, sans-serif" font-size="8" fill="#6b7280">Finalizado</text>

  <!-- Bottom Status Bar -->
  <g filter="shadow1">
    <rect x="60" y="395" width="480" height="60" rx="12" fill="white" stroke="#f3f4f6" stroke-width="1"/>
  </g>

  <!-- Status Items -->
  <circle cx="90" cy="425" r="10" fill="#ede9fe"/>
  <text x="90" y="429" font-family="Arial, sans-serif" font-size="11" fill="#6366f1" text-anchor="middle">&#x2713;</text>
  <text x="110" y="420" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1e1b4b">Tarea completada</text>
  <text x="110" y="433" font-family="Arial, sans-serif" font-size="8" fill="#9ca3af">Revisión de reportes - hace 2min</text>

  <line x1="270" y1="405" x2="270" y2="445" stroke="#f3f4f6" stroke-width="1"/>

  <circle cx="295" cy="425" r="10" fill="#fef3c7"/>
  <text x="295" y="429" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle">!</text>
  <text x="315" y="420" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1e1b4b">Reunión pendiente</text>
  <text x="315" y="433" font-family="Arial, sans-serif" font-size="8" fill="#9ca3af">Equipo de desarrollo - 14:00</text>

  <!-- Floating notification badge -->
  <g filter="shadow1">
    <rect x="490" y="20" width="80" height="32" rx="16" fill="#6366f1"/>
  </g>
  <circle cx="507" cy="36" r="6" fill="white" opacity="0.3"/>
  <text x="507" y="40" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">3</text>
  <text x="530" y="40" font-family="Arial, sans-serif" font-size="9" fill="white">Nuevos</text>
</svg>
