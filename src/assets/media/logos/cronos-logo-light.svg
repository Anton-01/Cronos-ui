<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="accentG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="creamG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="ls" x="-15%" y="-15%" width="135%" height="135%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#7c3aed" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Icon: Stylized clock + cupcake fusion -->
  <g filter="ls" transform="translate(8, 5)">
    <circle cx="35" cy="38" r="30" fill="url(#logoGrad)"/>
    <circle cx="35" cy="38" r="26" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
    <circle cx="35" cy="14" r="2" fill="white" opacity="0.9"/>
    <circle cx="35" cy="62" r="2" fill="white" opacity="0.9"/>
    <circle cx="9" cy="38" r="2" fill="white" opacity="0.9"/>
    <circle cx="61" cy="38" r="2" fill="white" opacity="0.9"/>
    <circle cx="48" cy="16" r="1.2" fill="white" opacity="0.5"/>
    <circle cx="57" cy="25" r="1.2" fill="white" opacity="0.5"/>
    <circle cx="57" cy="51" r="1.2" fill="white" opacity="0.5"/>
    <circle cx="48" cy="60" r="1.2" fill="white" opacity="0.5"/>
    <circle cx="22" cy="60" r="1.2" fill="white" opacity="0.5"/>
    <circle cx="13" cy="51" r="1.2" fill="white" opacity="0.5"/>
    <circle cx="13" cy="25" r="1.2" fill="white" opacity="0.5"/>
    <circle cx="22" cy="16" r="1.2" fill="white" opacity="0.5"/>
    <line x1="35" y1="38" x2="35" y2="20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="35" y1="38" x2="50" y2="30" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <circle cx="35" cy="38" r="4" fill="white"/>
    <path d="M31 40 l2 -4 h4 l2 4 z" fill="#ec4899"/>
    <ellipse cx="35" cy="36" rx="4" ry="2.5" fill="#fde68a"/>
    <circle cx="35" cy="34.5" r="1.2" fill="#f43f5e"/>
  </g>

  <!-- Brand Text (dark for light backgrounds) -->
  <text x="85" y="38" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#1e1b4b" letter-spacing="2">CRONOS</text>

  <!-- Tagline -->
  <text x="86" y="56" font-family="Arial, sans-serif" font-size="11" fill="#4c1d95" opacity="0.8" letter-spacing="4">REPOSTERÍA</text>

  <!-- Decorative line -->
  <rect x="86" y="62" width="45" height="2" rx="1" fill="url(#accentG)"/>
  <rect x="136" y="62" width="20" height="2" rx="1" fill="url(#creamG)" opacity="0.7"/>
</svg>
