<form class="form w-100" novalidate="novalidate" [formGroup]="registrationForm" (ngSubmit)="submit()">
  <div class="text-center mb-11">
    <h1 class="text-gray-900 fw-bolder mb-3">Crear Cuenta</h1>
    <div class="text-gray-500 fw-semibold fs-6">Cronos - Registro</div>
  </div>

  <ng-container *ngIf="hasError">
    <div class="mb-lg-15 alert alert-danger">
      <div class="alert-text font-weight-bold">{{ errorMessage || 'Error al registrar' }}</div>
    </div>
  </ng-container>

  <div class="fv-row mb-8">
    <label class="form-label fw-bolder text-gray-900 fs-6">Usuario</label>
    <input class="form-control bg-transparent" type="text" formControlName="username" autocomplete="off"
      [ngClass]="{ 'is-invalid': registrationForm.controls['username'].invalid && registrationForm.controls['username'].touched }" />
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{ validation: 'required', message: 'El usuario es requerido', control: registrationForm.controls['username'] }"></ng-container>
  </div>

  <div class="fv-row mb-8">
    <label class="form-label fw-bolder text-gray-900 fs-6">Email</label>
    <input class="form-control bg-transparent" type="email" formControlName="email" autocomplete="off"
      [ngClass]="{ 'is-invalid': registrationForm.controls['email'].invalid && registrationForm.controls['email'].touched }" />
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{ validation: 'required', message: 'El email es requerido', control: registrationForm.controls['email'] }"></ng-container>
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{ validation: 'email', message: 'El email no es válido', control: registrationForm.controls['email'] }"></ng-container>
  </div>

  <div class="row mb-8">
    <div class="col-md-6 fv-row">
      <label class="form-label fw-bolder text-gray-900 fs-6">Nombre</label>
      <input class="form-control bg-transparent" type="text" formControlName="firstName" autocomplete="off" />
    </div>
    <div class="col-md-6 fv-row">
      <label class="form-label fw-bolder text-gray-900 fs-6">Apellido</label>
      <input class="form-control bg-transparent" type="text" formControlName="lastName" autocomplete="off" />
    </div>
  </div>

  <div class="fv-row mb-8">
    <label class="form-label fw-bolder text-gray-900 fs-6">Teléfono</label>
    <input class="form-control bg-transparent" type="text" formControlName="phoneNumber" autocomplete="off" />
  </div>

  <div class="fv-row mb-8">
    <label class="form-label fw-bolder text-gray-900 fs-6">Contraseña</label>
    <input class="form-control bg-transparent" type="password" formControlName="password" autocomplete="off"
      [ngClass]="{ 'is-invalid': registrationForm.controls['password'].invalid && registrationForm.controls['password'].touched }" />
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{ validation: 'required', message: 'La contraseña es requerida', control: registrationForm.controls['password'] }"></ng-container>
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{ validation: 'minlength', message: 'Mínimo 6 caracteres', control: registrationForm.controls['password'] }"></ng-container>
  </div>

  <div class="fv-row mb-8">
    <label class="form-label fw-bolder text-gray-900 fs-6">Confirmar Contraseña</label>
    <input class="form-control bg-transparent" type="password" formControlName="confirmPassword" autocomplete="off"
      [ngClass]="{ 'is-invalid': registrationForm.hasError('passwordMismatch') && registrationForm.controls['confirmPassword'].touched }" />
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{ validation: 'required', message: 'Confirmar contraseña es requerido', control: registrationForm.controls['confirmPassword'] }"></ng-container>
    <ng-container *ngIf="registrationForm.hasError('passwordMismatch') && registrationForm.controls['confirmPassword'].touched">
      <div class="fv-plugins-message-container"><span role="alert">Las contraseñas no coinciden</span></div>
    </ng-container>
  </div>

  <div class="fv-row mb-8">
    <label class="form-check form-check-inline">
      <input type="checkbox" formControlName="agree" class="form-check-input" />
      <span class="form-check-label fw-semibold text-gray-700 fs-base ms-1">
        Acepto los <a href="#" class="ms-1 link-primary">Términos y Condiciones</a>.
      </span>
    </label>
  </div>

  <div class="d-grid mb-10">
    <button type="submit" [disabled]="registrationForm.invalid || isLoading" class="btn btn-primary">
      <ng-container *ngIf="!isLoading">
        <span class="indicator-label">Registrarse</span>
      </ng-container>
      <ng-container *ngIf="isLoading">
        <span class="indicator-progress" [style.display]="'block'">
          Espera...
          <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
        </span>
      </ng-container>
    </button>
  </div>

  <div class="text-gray-500 text-center fw-semibold fs-6">
    ¿Ya tienes cuenta?
    <a routerLink="/auth/login" class="link-primary fw-semibold">Inicia sesión</a>
  </div>
</form>

<ng-template #formError let-control="control" let-message="message" let-validation="validation">
  <ng-container *ngIf="control.hasError(validation) && (control.dirty || control.touched)">
    <div class="fv-plugins-message-container">
      <span role="alert">{{ message }}</span>
    </div>
  </ng-container>
</ng-template>
